name: Auto Bangumi Cloud

on:
  schedule:
    # 每小时定时触发运行一次 (检测常规订阅)
    - cron: '0 */1 * * *'
  repository_dispatch:
    # 监听网页端发送的一键点播事件，实现秒级响应下载
    types: [instant_download]
  workflow_dispatch:
    # 支持在 GitHub 页面上手动运行测试

permissions:
  contents: write # 赋予 actions 写入权限，用于将下载历史 downloaded.json 自动 push 回仓库

jobs:
  run-sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Aria2 Download Utility
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run parser, download and upload
        env:
          # 前端一键点播实时负载参数
          PAYLOAD_NAME: ${{ github.event.client_payload.name }}
          PAYLOAD_KEYWORD: ${{ github.event.client_payload.keyword }}
          PAYLOAD_TORRENT: ${{ github.event.client_payload.torrent_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/parser.py

      - name: Commit and Push state changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 检查是否有下载历史或最新资源被更新
          if [ -n "$(git status -s downloaded.json latest_rss.json)" ]; then
            git add downloaded.json latest_rss.json
            git commit -m "chore: 自动同步番剧下载历史与最新资源 [skip ci]"
            git push
            echo "[成功] 已成功向仓库推送最新状态数据"
          else
            echo "[通知] 无任何状态更新，无需提交"
          fi
