name: 定时更新动漫数据与部署 Pages

on:
  push:
    branches:
      - main
  schedule:
    # 每 4 小时自动运行一次 (UTC 时间，对应北京时间的 4, 8, 12, 16, 20, 24 点左右)
    - cron: '0 */4 * * *'
  workflow_dispatch:
    # 支持在 GitHub 仓库后台一键手动运行
  repository_dispatch:
    types: [resolve_anime_on_demand]


permissions:
  contents: write # 必须赋予写权限以允许推送 JSON 数据回仓库
  pages: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 签出当前仓库代码
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      # 2. 设置 Python 环境 (启用 requirements.txt 缓存机制)
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'

      # 3. 安装依赖库 (通过 pip 缓存机制瞬间装完 Python 包)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 执行爬虫数据抓取 (在 GitHub 虚拟机中无限制跑完详情抓取)
      - name: Fetch and staticize anime data
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ] && [ "${{ github.event.action }}" = "resolve_anime_on_demand" ]; then
            echo "[INFO] On-demand triggered for AID: ${{ github.event.client_payload.aid }}"
            python update_data.py --aid=${{ github.event.client_payload.aid }}
          else
            python update_data.py
          fi

      # 5. 安全同步并自动推回静态数据 JSON（“物理备份与强覆盖对齐” 无冲突版）
      - name: Commit and push static data changes
        run: |
          # A. 确保本地切回真实的 main 分支并跟踪远程，防止 detached HEAD 游离
          git checkout -B main
          
          # B. 检查是否有数据改动，若有则进行备份和无冲突拉取
          if [ -n "$(git status --porcelain data/)" ]; then
            echo "[INFO] Detected data changes. Backing up locally modified JSONs..."
            
            # 1. 物理备份本地的 data/ 目录
            mkdir -p /tmp/data_backup
            cp -r data/* /tmp/data_backup/
            
            # 2. 强行重置本地，使工作区回归 pristine 状态 (保证 pull 绝对不报 unstaged changes)
            git reset --hard HEAD
            
            # 3. 此时 100% 毫无阻碍地拉取并对齐远程最新 main
            git pull --rebase origin main
            
            # 4. 将刚才爬好的最新数据强行覆盖回来！
            cp -r /tmp/data_backup/* data/
            
            # 5. 执行常规提交与推送
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add data/
            git commit -m "chore(data): auto-update anime static databases"
            git push origin main
          else
            echo "[INFO] No data changes detected. Skipping push."
          fi

      # 6. 使用 GitHub 官方原生方式上传静态网页产物
      - name: Upload static files artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # 部署当前目录的所有静态网页文件

      # 7. 部署到 GitHub Pages 托管服务
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

