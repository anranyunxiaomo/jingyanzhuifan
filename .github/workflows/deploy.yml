name: 定时更新动漫数据与部署 Pages

on:
  push:
    branches:
      - main
  schedule:
    # 每 4 小时自动运行一次 (UTC 时间，对应北京时间的 4, 8, 12, 16, 20, 24 点左右)
    - cron: '0 */4 * * *'
  workflow_dispatch:
    # 支持在 GitHub 仓库后台一键手动运行
  repository_dispatch:
    types: [resolve_anime_on_demand]


permissions:
  contents: write # 必须赋予写权限以允许推送 JSON 数据回仓库
  pages: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 签出当前仓库代码
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      # 2. 设置 Python 环境 (启用 requirements.txt 缓存机制)
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'

      # 2.5 缓存 Playwright 浏览器二进制核心，防止每次重复下载
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-v1
          restore-keys: |
            ${{ runner.os }}-playwright-

      # 3. 安装依赖库 (包括 pypinyin 以及用于视频解析的 playwright)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            python -m playwright install chromium
          else
            echo "Playwright chromium cache hit! Skipping download."
          fi
          python -m playwright install-deps

      # 4. 执行爬虫数据抓取 (在 GitHub 虚拟机中无限制跑完详情抓取)
      - name: Fetch and staticize anime data
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ] && [ "${{ github.event.action }}" = "resolve_anime_on_demand" ]; then
            echo "[INFO] On-demand triggered for AID: ${{ github.event.client_payload.aid }}"
            python update_data.py --aid=${{ github.event.client_payload.aid }}
          else
            python update_data.py
          fi

      # 5. 安全同步并自动推回静态数据 JSON（“先 commit 后 rebase” 极速闭环防冲突版）
      - name: Commit and push static data changes
        run: |
          # A. 确保本地切回真实的 main 分支并跟踪远程，防止 detached HEAD 游离
          git checkout -B main
          
          # B. 先将数据改动暂存并 commit，让工作区保持绝对干净！
          git add data/
          if [ -n "$(git status --porcelain data/)" ]; then
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git commit -m "chore(data): auto-update anime static databases"
            
            # C. 本地已 commit 干净！此时拉取远程最新核心代码，进行 rebase 挂载对齐
            git pull --rebase origin main
            
            # D. 完美 Fast-Forward 安全推回远程 main
            git push origin main
          else
            echo "[INFO] No data changes detected. Skipping push."
          fi

      # 6. 使用 GitHub 官方原生方式上传静态网页产物
      - name: Upload static files artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # 部署当前目录的所有静态网页文件

      # 7. 部署到 GitHub Pages 托管服务
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

