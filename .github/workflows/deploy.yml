name: 定时更新动漫数据与部署 Pages

on:
  schedule:
    # 每 4 小时自动运行一次 (UTC 时间，对应北京时间的 4, 8, 12, 16, 20, 24 点左右)
    - cron: '0 */4 * * *'
  workflow_dispatch:
    # 支持在 GitHub 仓库后台一键手动运行

permissions:
  contents: write # 必须赋予写权限以允许推送 JSON 数据回仓库
  pages: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 签出当前仓库代码
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # 3. 安装依赖库 (包括 pypinyin 以提供完美的拼音模糊检索支持)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pypinyin

      # 4. 执行爬虫数据抓取 (在 GitHub 虚拟机中无限制跑完详情抓取)
      - name: Fetch and staticize anime data
        run: |
          python update_data.py

      # 5. 自动将新抓取到的静态 JSON 数据库 Commit 并 Push 回仓库
      # 这可以让本地的 search_index 滚雪球般越来越大，且保存历史详情数据
      - name: Commit and push static data changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          # 检查是否有文件改动，若有则 commit 并 push
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore(data): auto-update anime static databases"
            git push origin HEAD:${{ github.ref }}
          else
            echo "No data changes detected. Skipping git push."
          fi

      # 6. 使用 GitHub 官方原生方式上传静态网页产物
      - name: Upload static files artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # 部署当前目录的所有静态网页文件

      # 7. 部署到 GitHub Pages 托管服务
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

